<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Genichiro Translator</title>
    <style>
        
        body { 
            width: 350px; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        
        
        .title { 
            text-align: center; 
            font-size: 22px; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
        }
        
        .title span { 
            font-size: 14px; 
            color: #666; 
            margin-right: 8px; 
            font-weight: normal; 
        }

        
        .input-container { 
            position: relative; 
            margin-bottom: 5px; 
        }
        
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #0c0c0c; 
            color: #fff; 
            border: 1px solid #1a1a1a; 
            border-radius: 4px; 
            padding: 12px; 
            box-sizing: border-box; 
            resize: none; 
            font-size: 16px; 
            text-align: left; 
            direction: ltr; 
        }
        
        textarea::placeholder { color: #333; text-align: center; }
        textarea:focus { outline: none; border-color: #333; }

    
        #spellCheck {
            color: #ff0000; 
            font-size: 11px; 
            margin-top: 8px; 
            cursor: pointer; 
            display: none; 
            text-align: left;
            direction: ltr;
            letter-spacing: 0.5px;
        }

        
        .btn-action {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }
        
        .btn-action:hover { background: #333; color: #fff; }
        .btn-paste { position: absolute; bottom: 8px; right: 8px; }


        .status-area { 
            margin: 15px 0 40px 0; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            height: 20px; 
        }
        
        .status-text-wrap { 
            display: flex; 
            align-items: center; 
            flex-direction: row; 
        }
        
        #statusText { font-size: 11px; color: #444; letter-spacing: 1px; order: 1; }
        
        .status-dot { 
            width: 6px; 
            height: 6px; 
            background-color: #222; 
            border-radius: 50%; 
            margin-left: 10px; 
            order: 2;
            transition: all 0.3s ease;
        }

        
        .status-area.loading .status-dot { background-color: #ff0000; box-shadow: 0 0 8px #ff0000; }
        .status-area.success .status-dot { background-color: #00ff00; box-shadow: 0 0 8px #00ff00; }

        
        .result-container { 
            background-color: #050505; 
            border: 1px solid #111; 
            border-radius: 2px; 
            padding: 20px 15px; 
            min-height: 100px; 
            position: relative; 
        }
        
        .result-label { 
            position: absolute; 
            top: -9px; 
            left: 12px; 
            background-color: #000; 
            padding: 0 8px; 
            font-size: 9px; 
            color: #222; 
            letter-spacing: 2px; 
        }

        .btn-copy { position: absolute; bottom: 8px; left: 8px; }

        
        #output { font-size: 20px; margin-bottom: 15px; color: #fff; line-height: 1.4; text-align: right; }
        #details { 
            font-size: 13px; 
            color: #555; 
            border-top: 1px solid #111; 
            padding-top: 12px; 
            text-align: right; 
        }
    </style>
</head>
<body>

    <h1 class="title"><span>GENICHIRO</span> TRANSLATOR</h1>

    <div class="input-container">
        <textarea id="chatInput" placeholder="Enter text..."></textarea>
        <!-- مكان ظهور الاقتراح الإملائي -->
        <div id="spellCheck"></div>
        <button id="pasteBtn" class="btn-action btn-paste">PASTE</button>
    </div>

    <div id="status-area" class="status-area">
        <div class="status-text-wrap">
            <span id="statusText">Ready</span>
            <div class="status-dot"></div>
        </div>
    </div>

    <div class="result-container">
        <div class="result-label">RESULT</div>
        <div id="output">...</div>
        <div id="details">المفردات ستظهر هنا</div>
        <button id="copyBtn" class="btn-action btn-copy">COPY</button>
    </div>

    
    <script src="popup.js"></script>
</body>
</html>
